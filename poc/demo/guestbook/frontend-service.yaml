# SOURCE: https://cloud.google.com/kubernetes-engine/docs/tutorials/guestbook
apiVersion: v1
kind: Service
metadata:
  name: frontend
  labels:
    app: guestbook
    tier: frontend
spec:
  # DIVERGENCE (PoC): the services data plane is IPv6-only (routed IPv6 pod
  # networking); request an IPv6 ClusterIP (the apiserver allocates it, no
  # controller-manager needed).
  ipFamilies: [IPv6]
  # if your cluster supports it, uncomment the following to automatically create
  # an external load-balanced IP for the frontend service.
  # type: LoadBalancer
  #type: LoadBalancer
  ports:
    # the port that this service should serve on
  - port: 80
  selector:
    app: guestbook
    tier: frontend