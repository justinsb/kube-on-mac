# Two backend pods + an IPv6 ClusterIP Service + a client.
# Requires the agent running with the nftables kernel (--kernel vmlinux-nft-arm64).
#
#   kubectl apply -f demo/service.yaml
#   VIP=$(kubectl get svc web -o jsonpath='{.spec.clusterIP}')
#   for i in $(seq 10); do kubectl exec client -- wget -qO- "http://[$VIP]:80/"; done
#     -> a mix of backend1 / backend2 (in-kernel numgen load balancing)
apiVersion: v1
kind: Pod
metadata: { name: backend1, labels: { app: web } }
spec:
  restartPolicy: Never
  containers:
    - name: web
      image: python:3.12-alpine
      command: ["/bin/sh", "-c", "echo backend1 > /index.html; cd /; exec python3 -m http.server 8080 --bind ::"]
      readinessProbe: { httpGet: { path: /index.html, port: 8080 }, periodSeconds: 2 }
---
apiVersion: v1
kind: Pod
metadata: { name: backend2, labels: { app: web } }
spec:
  restartPolicy: Never
  containers:
    - name: web
      image: python:3.12-alpine
      command: ["/bin/sh", "-c", "echo backend2 > /index.html; cd /; exec python3 -m http.server 8080 --bind ::"]
      readinessProbe: { httpGet: { path: /index.html, port: 8080 }, periodSeconds: 2 }
---
apiVersion: v1
kind: Service
metadata: { name: web }
spec:
  ipFamilies: [IPv6]
  selector: { app: web }
  ports: [{ port: 80, targetPort: 8080 }]
---
apiVersion: v1
kind: Pod
metadata: { name: client }
spec:
  restartPolicy: Never
  containers:
    - name: client
      image: alpine:3.22
      command: ["sleep", "3600"]
