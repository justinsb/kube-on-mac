# The node agent's client identity: the node itself, authorized by the Node
# authorizer plus the explicit grants in ../rbac.yaml (the agent also plays
# the node's kube-proxy/DNS hat: service and endpoint resolution, bootstrap
# ClusterIP claims). No system:masters.
apiVersion: kube-on-macos.io/v1alpha1
kind: Certificate
spec:
  issuerRef: pki/ca
  commonName: system:node:macos-poc
  organizations: [system:nodes]
  usages: ["client auth"]
